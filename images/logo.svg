  <rect x="70" y="85" width="60" height="12" fill="black"></rect>

  <!-- Tassel -->
  <line x1="135" y1="85" x2="135" y2="110" stroke="black" stroke-width="5"></line>
  <circle cx="135" cy="115" r="6" fill="black"></circle>

  <!-- Open Book -->
  <path d="M60 135 Q100 115 140 135" stroke="black" stroke-width="6" fill="none"></path>
  <path d="M60 135 Q100 155 140 135" stroke="black" stroke-width="6" fill="none"></path>

</svg>